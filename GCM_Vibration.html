<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCM · NUKE EMBLEM</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0a0a12;overflow:hidden;font-family:'Share Tech Mono',monospace;}

  #title{position:fixed;top:16px;left:50%;transform:translateX(-50%);
    text-align:center;pointer-events:none;z-index:10;}
  #title h1{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:900;
    color:#f0c040;letter-spacing:5px;}
  #title p{font-size:7px;color:#2a3a4a;letter-spacing:2px;margin-top:2px;}

  #steps{position:fixed;top:50%;left:14px;transform:translateY(-50%);
    z-index:10;display:flex;flex-direction:column;gap:14px;}
  .sdot{display:flex;align-items:center;gap:7px;font-size:7px;letter-spacing:2px;
    color:#1a2a3a;transition:color .3s;}
  .sdot .dot{width:5px;height:5px;border-radius:50%;background:#1a2a3a;flex-shrink:0;transition:all .3s;}
  .sdot.active{color:#f0c040;}
  .sdot.active .dot{background:#f0c040;box-shadow:0 0 7px #f0c04099;}
  .sdot.done{color:#2a3a4a;}
  .sdot.done .dot{background:#2a3a4a;}

  #ctrl{position:fixed;bottom:0;left:0;right:0;z-index:20;
    background:rgba(8,8,16,.96);border-top:1px solid #0d1a26;}

  #ctrl-bar{display:flex;align-items:center;justify-content:space-between;
    padding:6px 14px;gap:10px;}

  #ctrl-expand{display:flex;flex-direction:column;gap:5px;
    padding:4px 14px 8px;
    max-height:0;overflow:hidden;transition:max-height .3s ease, padding .3s ease;}
  #ctrl-expand.open{max-height:400px;padding:4px 14px 8px;}

  #toggle-btn{font-family:'Share Tech Mono',monospace;font-size:9px;padding:3px 10px;
    border:1px solid #1a2a3a;background:transparent;color:#334455;
    cursor:pointer;transition:all .2s;letter-spacing:1px;flex-shrink:0;}
  #toggle-btn:hover{border-color:#a8d8ea55;color:#a8d8ea88;}
  #toggle-btn.open{border-color:#f0c04055;color:#f0c04088;}

  .crow{display:flex;align-items:center;gap:8px;min-height:20px;transition:opacity .3s;}
  .crow.hidden{opacity:0;pointer-events:none;height:0;min-height:0;overflow:hidden;}
  .clbl{font-size:7px;letter-spacing:2px;width:70px;text-align:right;flex-shrink:0;}
  .clbl.ca{color:#a8d8ea;} .clbl.cb{color:#7ec8a0;} .clbl.cp{color:#f0c040;}

  .pill{font-family:'Share Tech Mono',monospace;font-size:9px;padding:2px 8px;
    border:1px solid #1a2a3a;background:rgba(8,8,16,.9);color:#334455;
    cursor:pointer;transition:all .18s;letter-spacing:1px;line-height:1.5;text-align:center;}
  .pill:hover{border-color:#a8d8ea55;color:#a8d8ea88;}
  .pill .sub{display:block;font-size:6px;opacity:.6;letter-spacing:.5px;}
  .pill.sa{border-color:#a8d8ea;color:#a8d8ea;background:rgba(168,216,234,.07);}
  .pill.sb{border-color:#7ec8a0;color:#7ec8a0;background:rgba(126,200,160,.07);}
  .pill.sp{border-color:#f0c040;color:#f0c040;background:rgba(240,192,64,.07);}

  .rctr{display:flex;align-items:center;gap:5px;}
  .rval{font-size:11px;color:#a8d8ea;width:20px;text-align:center;}
  .rarw{font-family:'Share Tech Mono',monospace;font-size:11px;padding:1px 9px;
    border:1px solid #1a3a4a;background:rgba(8,8,16,.9);color:#1a3a4a;
    cursor:pointer;transition:all .18s;}
  .rarw:hover{border-color:#a8d8ea;color:#a8d8ea;}
  .rarw:disabled{opacity:.2;cursor:not-allowed;}
  #ring-sub{font-size:7px;color:#1a3a4a;letter-spacing:1px;margin-left:4px;}

  #nav{display:flex;gap:8px;align-items:center;}
  .nbtn{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;
    padding:4px 16px;border:1px solid #f0c040;background:rgba(8,8,16,.9);
    color:#f0c040;cursor:pointer;transition:all .2s;}
  .nbtn:hover{background:rgba(240,192,64,.1);}
  .nbtn:disabled{border-color:#1a2a3a;color:#1a2a3a;cursor:not-allowed;}
  #stepnum{font-size:8px;color:#334455;letter-spacing:2px;min-width:30px;text-align:center;}
  #step-msg{font-family:'Orbitron',sans-serif;font-size:9px;color:#f0c040;
    letter-spacing:3px;flex:1;text-align:center;}

  .lbl{position:fixed;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;
    pointer-events:none;z-index:10;text-shadow:0 0 10px currentColor;}
</style>
</head>
<body>

<div id="title">
  <h1>GCM · NUKE EMBLEM</h1>
  <p>A = CIRCLE · B = SHAPE · P = EMERGENT</p>
</div>

<div id="steps">
  <div class="sdot active" id="sd0"><div class="dot"></div>CORRIDOR</div>
  <div class="sdot" id="sd1"><div class="dot"></div>A · CIRCLE</div>
  <div class="sdot" id="sd2"><div class="dot"></div>B · SHAPE</div>
  <div class="sdot" id="sd3"><div class="dot"></div>FRAMING</div>
  <div class="sdot" id="sd4"><div class="dot"></div>P · NUCLEUS</div>
</div>

<div class="lbl" id="lA" style="color:#a8d8ea;display:none">A</div>
<div class="lbl" id="lP" style="color:#f0c040;display:none">P</div>
<div class="lbl" id="lB" style="color:#7ec8a0;display:none">B</div>

<div id="ctrl">

  <!-- Always-visible thin bar -->
  <div id="ctrl-bar">
    <div id="nav">
      <button class="nbtn" id="btn-back" disabled>◄</button>
      <span id="stepnum">1 / 5</span>
      <button class="nbtn" id="btn-next">NEXT ►</button>
    </div>
    <span id="step-msg"></span>
    <button id="toggle-btn">⚙ CONTROLS</button>
  </div>

  <!-- Expandable controls -->
  <div id="ctrl-expand">

    <!-- Rings -->
    <div class="crow hidden" id="row-rings">
      <span class="clbl ca">RINGS</span>
      <div class="rctr">
        <button class="rarw" id="ring-dn">−</button>
        <span class="rval" id="ring-val">1</span>
        <button class="rarw" id="ring-up">+</button>
      </div>
      <span id="ring-sub"></span>
    </div>

    <!-- A shape + pose on one line -->
    <div class="crow hidden" id="row-ashape">
      <span class="clbl ca">A · SHAPE</span>
      <div id="ashape-btns" style="display:flex;gap:4px;"></div>
      <span style="font-size:7px;color:#1a3a4a;margin:0 4px;">POSE</span>
      <div id="apose-btns" style="display:flex;gap:4px;flex-wrap:wrap;"></div>
    </div>

    <!-- A density -->
    <div class="crow hidden" id="row-density">
      <span class="clbl ca">A · DENSITY</span>
      <div id="density-btns" style="display:flex;gap:4px;"></div>
      <span id="density-val" style="font-size:7px;color:#a8d8ea33;margin-left:6px;"></span>
    </div>

    <!-- B shape + pose on one line -->
    <div class="crow hidden" id="row-shape">
      <span class="clbl cb">B · SHAPE</span>
      <div id="shape-btns" style="display:flex;gap:4px;"></div>
      <span style="font-size:7px;color:#1a3a2a;margin:0 4px;">POSE</span>
      <div id="pose-btns" style="display:flex;gap:4px;flex-wrap:wrap;"></div>
    </div>

    <!-- B density -->
    <div class="crow hidden" id="row-bdensity">
      <span class="clbl cb">B · DENSITY</span>
      <div id="bdensity-btns" style="display:flex;gap:4px;"></div>
      <span id="bdensity-val" style="font-size:7px;color:#7ec8a033;margin-left:6px;"></span>
    </div>

    <!-- Framing -->
    <div class="crow hidden" id="row-frame">
      <span class="clbl cp">FRAMING</span>
      <div id="frame-btns" style="display:flex;gap:4px;"></div>
    </div>

  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const PI=Math.PI,PI2=PI*2;

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setClearColor(0x0a0a12,1);
document.body.appendChild(renderer.domElement);

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(52,innerWidth/innerHeight,.01,200);
let sph={theta:.5,phi:.95,r:13};
let drag=false,pm={x:0,y:0},tp=null;
const cv=renderer.domElement;
cv.addEventListener('mousedown',e=>{drag=true;pm={x:e.clientX,y:e.clientY};});
window.addEventListener('mouseup',()=>drag=false);
window.addEventListener('mousemove',e=>{
  if(!drag)return;
  sph.theta-=(e.clientX-pm.x)*.007;
  sph.phi=Math.max(.06,Math.min(PI-.06,sph.phi+(e.clientY-pm.y)*.007));
  pm={x:e.clientX,y:e.clientY};
});
cv.addEventListener('wheel',e=>{sph.r=Math.max(3,Math.min(32,sph.r+e.deltaY*.013));},{passive:true});
cv.addEventListener('touchstart',e=>{tp={x:e.touches[0].clientX,y:e.touches[0].clientY};},{passive:true});
cv.addEventListener('touchmove',e=>{
  if(!tp)return;
  sph.theta-=(e.touches[0].clientX-tp.x)*.007;
  sph.phi=Math.max(.06,Math.min(PI-.06,sph.phi+(e.touches[0].clientY-tp.y)*.007));
  tp={x:e.touches[0].clientX,y:e.touches[0].clientY};
},{passive:true});
cv.addEventListener('touchend',()=>tp=null,{passive:true});

const root=new THREE.Group();scene.add(root);
const gAxis=new THREE.Group();root.add(gAxis);
const gA=new THREE.Group();root.add(gA);
const gB=new THREE.Group();root.add(gB);
const gFrame=new THREE.Group();root.add(gFrame);
const gP=new THREE.Group();root.add(gP);

let step=0, numRings=1, aSides=36, aVDeg=0, bSides=3, vDeg=30, nMult=4, bMult=1, frameOp=0.6;
const WY=2.8, MAX_R=3.0, MIN_R=0.55;

function ringRadii(){
  if(numRings===1) return [MAX_R];
  return Array.from({length:numRings},(_,i)=>MIN_R+(MAX_R-MIN_R)*(i/(numRings-1)));
}

function v3(x,y,z){return new THREE.Vector3(x,y,z);}
function mkDot(p,col,r=.06,op=1){
  const m=new THREE.Mesh(new THREE.SphereGeometry(r,8,8),
    new THREE.MeshBasicMaterial({color:col,transparent:op<1,opacity:op}));
  m.position.copy(p);return m;
}
function mkSeg(a,b,col,op=1){
  const g=new THREE.BufferGeometry().setFromPoints([a,b]);
  return new THREE.Line(g,new THREE.LineBasicMaterial({color:col,transparent:op<1,opacity:op}));
}
function mkLoop(pts,col,op){
  const g=new THREE.BufferGeometry().setFromPoints([...pts,pts[0]]);
  return new THREE.Line(g,new THREE.LineBasicMaterial({color:col,transparent:true,opacity:op}));
}
function mkPlane(y,col){
  const w=MAX_R*2+.8, geo=new THREE.BoxGeometry(w,.012,w);
  const g=new THREE.Group();
  const fill=new THREE.Mesh(geo,new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.010,side:THREE.DoubleSide,depthWrite:false}));
  fill.position.y=y; g.add(fill);
  const wire=new THREE.LineSegments(new THREE.EdgesGeometry(geo),new THREE.LineBasicMaterial({color:col,transparent:true,opacity:.18}));
  wire.position.y=y; g.add(wire);
  return g;
}

const A_COLS=[0xc8e4f8,0xb8d8f0,0xa8d8ea,0x98c8da,0x88b8ca,0x78a8ba,0x6898aa,0x5888a0];
const B_COLS=[0xbec8c0,0xaec8b8,0x9ec8b0,0x8ec8a8,0x7ec8a0,0x68c890,0x58c880,0x48c870];
const P_COLS=[0xf8d050,0xf0c040,0xeaaa30,0xe49420,0xde8010,0xe49420,0xeaaa30,0xf0c040];
const ORB_COLS=[0x5090e0,0x9050e0,0xe05070,0xe09030,0x50d880,0x30c0c8,0xe0e040,0xe050b0];

function nearest(ap,verts){
  let best=verts[0],bestD=Infinity,vi=0;
  const a1=Math.atan2(ap.z,ap.x);
  verts.forEach((bv,i)=>{
    let d=Math.abs(a1-Math.atan2(bv.z,bv.x));
    if(d>PI)d=PI2-d;
    if(d<bestD){bestD=d;best=bv;vi=i;}
  });
  return{vert:best,dist:bestD,vi};
}

function build(){
  [gAxis,gA,gB,gFrame,gP].forEach(g=>{while(g.children.length)g.remove(g.children[0]);});

  const radii=ringRadii();
  const rot=vDeg*PI/180;
  const aRot=aVDeg*PI/180;
  const N=nMult*aSides;
  const BN=bMult*bSides;
  const maxAng=PI/Math.max(bSides,BN);

  // W axis
  gAxis.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints([v3(0,-WY*1.55,0),v3(0,WY*1.55,0)]),
    new THREE.LineBasicMaterial({color:0x0d2030,transparent:true,opacity:.65})
  ));
  for(let t=-3;t<=3;t++) gAxis.add(mkSeg(v3(-.1,t,0),v3(.1,t,0),0x0d1e2a,.4));
  gAxis.add(mkPlane(WY,0xa8d8ea));
  gAxis.add(mkPlane(-WY,0x7ec8a0));
  gAxis.add(mkPlane(0,0xf0c040));

  // A rings — distributed along shape edges
  const aRings=radii.map(r=>{
    const shapeVerts=Array.from({length:aSides},(_,i)=>{
      const a=i/aSides*PI2+PI/2+aRot;
      return{x:Math.cos(a)*r, z:Math.sin(a)*r};
    });
    if(nMult===1){
      return shapeVerts.map(v=>v3(v.x,WY,v.z));
    }
    const pts=[];
    for(let s=0;s<aSides;s++){
      const v0=shapeVerts[s], v1=shapeVerts[(s+1)%aSides];
      for(let j=0;j<nMult;j++){
        const t=j/nMult;
        pts.push(v3(v0.x+(v1.x-v0.x)*t, WY, v0.z+(v1.z-v0.z)*t));
      }
    }
    return pts;
  });
  // B rings — bMult=1: vertices only; bMult>1: points distributed along edges
  const bRings=radii.map(r=>{
    const shapeVerts=Array.from({length:bSides},(_,i)=>{
      const a=i/bSides*PI2+PI/2+rot;
      return{x:Math.cos(a)*r, z:Math.sin(a)*r};
    });
    if(bMult===1){
      // Just the vertices
      return shapeVerts.map(v=>v3(v.x,-WY,v.z));
    }
    // Distribute bMult points per side along each edge (exclude last vertex to avoid overlap)
    const pts=[];
    for(let s=0;s<bSides;s++){
      const v0=shapeVerts[s], v1=shapeVerts[(s+1)%bSides];
      for(let j=0;j<bMult;j++){
        const t=j/bMult;
        pts.push(v3(v0.x+(v1.x-v0.x)*t, -WY, v0.z+(v1.z-v0.z)*t));
      }
    }
    return pts;
  });

  // A
  if(step>=1){
    radii.forEach((r,ri)=>{
      const col=A_COLS[ri%8];
      gA.add(mkLoop(aRings[ri],col,.55));
      aRings[ri].forEach(p=>gA.add(mkDot(p,col,.045)));
      if(ri>0) aRings[ri].forEach((p,i)=>{
        if(i%Math.ceil(N/10)===0) gA.add(mkSeg(p,aRings[ri-1][i],col,.07));
      });
    });
  }

  // B
  if(step>=2){
    radii.forEach((r,ri)=>{
      const col=B_COLS[ri%8];
      const verts=bRings[ri];
      gB.add(mkLoop(verts,col,.62));
      verts.forEach(v=>gB.add(mkDot(v,col,bSides>8?.038:.082)));
      if(ri===radii.length-1) verts.forEach(v=>gB.add(mkSeg(v3(0,-WY,0),v,col,.07)));
      if(ri>0) verts.forEach((v,i)=>gB.add(mkSeg(v,bRings[ri-1][i],col,.09)));
    });
  }

  // Framing
  if(step>=3){
    radii.forEach((r,ri)=>{
      if(ri<radii.length-Math.min(2,numRings)) return;
      aRings[ri].forEach(ap=>{
        const{vert,dist,vi}=nearest(ap,bRings[ri]);
        const prox=Math.max(0,1-dist/maxAng);
        const op=frameOp*(.10+.90*prox);
        if(op<.012) return;
        const col=ORB_COLS[vi%8];
        gFrame.add(mkSeg(ap,v3(ap.x*.5,0,ap.z*.5),col,op*.75));
        gFrame.add(mkSeg(vert,v3(vert.x*.5,0,vert.z*.5),col,op*.55));
      });
    });
  }

  // P
  if(step>=4){
    radii.forEach((r,ri)=>{
      const col=P_COLS[ri%8];
      const pPts=[];
      aRings[ri].forEach(ap=>{
        const{vert,dist}=nearest(ap,bRings[ri]);
        const prox=Math.max(0,1-dist/maxAng);
        const px=(ap.x+vert.x)*.5,pz=(ap.z+vert.z)*.5;
        gP.add(mkDot(v3(px,0,pz),col,.018+.072*prox,.06+.94*prox));
        pPts.push(v3(px,0,pz));
      });
      if(ri===radii.length-1) gP.add(mkLoop(pPts,col,.11));
    });
    // Nucleus
    gP.add(mkDot(v3(0,0,0),0xfff0a0,.13));
    [.20,.40].forEach((r,i)=>gP.add(mkLoop(
      Array.from({length:64},(_,j)=>v3(Math.cos(j/64*PI2)*r,0,Math.sin(j/64*PI2)*r)),
      0xf0c040,i===0?.6:.22
    )));
  }

  updateUI();
}

// ── UI ────────────────────────────────────────────────────────────────────────
const MSGS=['W AXIS · THE CORRIDOR','A · THE UPPER BOUNDARY','B · THE LOWER BOUNDARY','FRAMING · THE ORBITALS','P · THE NUCLEUS'];
const RING_SUBS=['','1 ring · outer edge only','2 rings · depth appears','3 rings · disc forming','4 rings · half disc','5 rings · getting dense','6 rings · dense disc','7 rings · almost full','8 rings · full disc · classic emblem'];
const V_PRESETS={2:[[0,'AXIS'],[90,'CROSS']],3:[[0,'UP'],[30,'NUKE'],[60,'FLIP'],[90,'DOWN']],4:[[0,'CORNER'],[45,'FLAT']],5:[[0,'POINT'],[36,'OFFSET']],6:[[0,'FLAT'],[30,'STAR'],[60,'FLIP']],36:[[0,'RING'],[5,'+5°'],[10,'+10°']]};
const D_PRESETS=[[1,'= B'],[2,'2×'],[4,'4×'],[8,'8×'],[12,'12×']];
const F_PRESETS=[[0,'OFF'],[0.3,'LOW'],[0.6,'MED'],[1.0,'FULL']];

function pills(containerId,items,selClass,activeFn,labelFn){
  const el=document.getElementById(containerId);
  el.innerHTML='';
  items.forEach(item=>{
    const b=document.createElement('button');
    b.className='pill'+(activeFn(item)?' '+selClass:'');
    b.innerHTML=labelFn(item);
    b.onclick=()=>{ b._action(); };
    b._action=()=>{ b._run(item); build(); };
    b._run=item._run||(i=>{}); // set below
    el.appendChild(b);
    item._btn=b;
  });
  return el;
}

function updateUI(){
  document.getElementById('step-msg').textContent=MSGS[step];
  document.getElementById('stepnum').textContent=(step+1)+' / 5';
  document.getElementById('btn-back').disabled=step===0;
  document.getElementById('btn-next').disabled=step===4;
  for(let i=0;i<5;i++){
    document.getElementById('sd'+i).className='sdot'+(i===step?' active':i<step?' done':'');
  }

  const vis=(id,on)=>document.getElementById(id).classList.toggle('hidden',!on);
  vis('row-rings',step>=1); vis('row-density',step>=1); vis('row-ashape',step>=1);
  vis('row-shape',step>=2); vis('row-bdensity',step>=2);
  vis('row-frame',step>=3);

  // Ring counter
  document.getElementById('ring-val').textContent=numRings;
  document.getElementById('ring-dn').disabled=numRings<=1;
  document.getElementById('ring-up').disabled=numRings>=8;
  document.getElementById('ring-sub').textContent=RING_SUBS[numRings]||'';

  // A Shape buttons
  const asb=document.getElementById('ashape-btns'); asb.innerHTML='';
  [[2,'—'],[3,'△'],[4,'□'],[5,'⬠'],[6,'⬡'],[36,'◯']].forEach(([s,lbl])=>{
    const b=document.createElement('button');
    b.className='pill'+(aSides===s?' sa':'');
    b.textContent=lbl;
    b.onclick=()=>{
      aSides=s;
      const p=V_PRESETS[s]||[[0,'']];
      if(!p.find(x=>x[0]===aVDeg)) aVDeg=p[0][0];
      build();
    };
    asb.appendChild(b);
  });

  // A Pose buttons (inline in row-ashape)
  const apb=document.getElementById('apose-btns'); apb.innerHTML='';
  (V_PRESETS[aSides]||[[0,'0°']]).forEach(([deg,name])=>{
    const b=document.createElement('button');
    b.className='pill'+(aVDeg===deg?' sa':'');
    b.innerHTML=`${deg}°<span class="sub">${name}</span>`;
    b.onclick=()=>{aVDeg=deg;build();};
    apb.appendChild(b);
  });

  // Shape buttons
  const sb=document.getElementById('shape-btns'); sb.innerHTML='';
  [[2,'—'],[3,'△'],[4,'□'],[5,'⬠'],[6,'⬡'],[36,'◯']].forEach(([s,lbl])=>{
    const b=document.createElement('button');
    b.className='pill'+(bSides===s?' sb':'');
    b.textContent=lbl;
    b.onclick=()=>{
      bSides=s;
      const p=V_PRESETS[s]||[[0,'']];
      if(!p.find(x=>x[0]===vDeg)) vDeg=p[Math.min(1,p.length-1)][0];
      build();
    };
    sb.appendChild(b);
  });

  // Pose buttons (inline in row-shape)
  const pb=document.getElementById('pose-btns'); pb.innerHTML='';
  (V_PRESETS[bSides]||[[0,'0°']]).forEach(([deg,name])=>{
    const b=document.createElement('button');
    b.className='pill'+(vDeg===deg?' sb':'');
    b.innerHTML=`${deg}°<span class="sub">${name}</span>`;
    b.onclick=()=>{vDeg=deg;build();};
    pb.appendChild(b);
  });

  // B Density buttons
  const bdb=document.getElementById('bdensity-btns'); bdb.innerHTML='';
  [[1,'= B'],[2,'2×'],[4,'4×'],[8,'8×'],[12,'12×']].forEach(([m,name])=>{
    const b=document.createElement('button');
    b.className='pill'+(bMult===m?' sb':'');
    b.innerHTML=`${name}<span class="sub">${m*bSides}pts</span>`;
    b.onclick=()=>{bMult=m;build();};
    bdb.appendChild(b);
  });
  document.getElementById('bdensity-val').textContent=(bMult*bSides)+' pts/ring';

  // Density buttons
  const db=document.getElementById('density-btns'); db.innerHTML='';
  D_PRESETS.forEach(([m,name])=>{
    const b=document.createElement('button');
    b.className='pill'+(nMult===m?' sa':'');
    b.innerHTML=`${name}<span class="sub">${m*aSides}pts</span>`;
    b.onclick=()=>{nMult=m;build();};
    db.appendChild(b);
  });
  document.getElementById('density-val').textContent=(nMult*aSides)+' pts/ring';

  // Framing buttons
  const fb=document.getElementById('frame-btns'); fb.innerHTML='';
  F_PRESETS.forEach(([op,name])=>{
    const b=document.createElement('button');
    b.className='pill'+(frameOp===op?' sp':'');
    b.textContent=name;
    b.onclick=()=>{frameOp=op;build();};
    fb.appendChild(b);
  });

  document.getElementById('lA').style.display=step>=1?'block':'none';
  document.getElementById('lB').style.display=step>=2?'block':'none';
  document.getElementById('lP').style.display=step>=4?'block':'none';
}

document.getElementById('btn-next').onclick=()=>{if(step<4){step++;build();}};
document.getElementById('btn-back').onclick=()=>{if(step>0){step--;build();}};
document.getElementById('ring-dn').onclick=()=>{if(numRings>1){numRings--;build();}};
document.getElementById('ring-up').onclick=()=>{if(numRings<8){numRings++;build();}};

document.getElementById('toggle-btn').onclick=function(){
  const exp=document.getElementById('ctrl-expand');
  const open=exp.classList.toggle('open');
  this.classList.toggle('open',open);
  this.textContent=open?'✕ CLOSE':'⚙ CONTROLS';
};
function project(pos){
  const v=pos.clone().project(camera);
  return{x:(v.x*.5+.5)*innerWidth,y:(-v.y*.5+.5)*innerHeight};
}
function placeLabel(id,pos){
  const el=document.getElementById(id);
  if(el.style.display==='none')return;
  const p=project(pos);
  el.style.left=(p.x+10)+'px';el.style.top=(p.y-7)+'px';
}

function animate(){
  requestAnimationFrame(animate);
  if(!drag&&!tp) sph.theta+=.0007;
  camera.position.set(
    sph.r*Math.sin(sph.phi)*Math.sin(sph.theta),
    sph.r*Math.cos(sph.phi),
    sph.r*Math.sin(sph.phi)*Math.cos(sph.theta)
  );
  camera.lookAt(0,0,0);
  placeLabel('lA',v3(MAX_R+.4,WY,0));
  placeLabel('lB',v3(MAX_R+.4,-WY,0));
  placeLabel('lP',v3(MAX_R+.4,0,0));
  renderer.render(scene,camera);
}

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

build();
animate();
</script>
</body>
</html>
