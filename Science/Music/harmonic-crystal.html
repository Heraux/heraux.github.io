<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Harmonic Crystal</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#010204;overflow:hidden;font-family:'JetBrains Mono',monospace;}
#viewport{position:fixed;top:0;left:0;right:0;bottom:62px;}
#three-canvas{position:absolute;inset:0;width:100%;height:100%;cursor:grab;}
#three-canvas:active{cursor:grabbing;}
#label-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
#hud{
  position:fixed;bottom:0;left:0;right:0;height:62px;
  display:flex;align-items:center;gap:5px;padding:0 12px;
  background:rgba(1,2,4,0.98);border-top:1px solid rgba(255,255,255,0.04);
}
.note-btn{
  padding:3px 7px;border:1px solid;background:transparent;
  font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.06em;
  cursor:pointer;transition:all 0.1s;min-width:28px;text-align:center;opacity:0.5;
}
.note-btn:hover{filter:brightness(3);transform:translateY(-1px);opacity:1;}
.note-btn.lit{filter:brightness(5);transform:translateY(-2px) scale(1.12);opacity:1;}
#status{flex:1;text-align:center;font-size:9px;color:rgba(255,255,255,0.15);
  letter-spacing:0.15em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ctrl{padding:4px 10px;border:1px solid rgba(255,255,255,0.07);background:transparent;
  color:rgba(255,255,255,0.25);font-family:'JetBrains Mono',monospace;font-size:9px;
  cursor:pointer;text-transform:uppercase;letter-spacing:0.1em;transition:all 0.15s;white-space:nowrap;flex-shrink:0;}
.ctrl:hover{border-color:rgba(255,255,255,0.3);color:rgba(255,255,255,0.6);}
.ctrl.active{border-color:rgba(255,255,255,0.5);color:rgba(255,255,255,0.9);background:rgba(255,255,255,0.05);}
.sep{width:1px;height:28px;background:rgba(255,255,255,0.06);flex-shrink:0;}
#speed-wrap{display:flex;align-items:center;gap:4px;flex-shrink:0;}
#speed-wrap span{font-size:8px;color:rgba(255,255,255,0.2);white-space:nowrap;}
input[type=range].spd{width:55px;-webkit-appearance:none;height:2px;background:rgba(255,255,255,0.1);outline:none;cursor:pointer;}
input[type=range].spd::-webkit-slider-thumb{-webkit-appearance:none;width:8px;height:8px;background:rgba(255,255,255,0.4);border-radius:50%;cursor:pointer;}
</style>
</head>
<body>
<div id="viewport">
  <canvas id="three-canvas"></canvas>
  <canvas id="label-canvas"></canvas>
</div>
<div id="hud">
  <div id="note-btns" style="display:flex;gap:3px;flex-shrink:0;"></div>
  <div class="sep"></div>
  <div id="status">select a song</div>
  <div class="sep"></div>
  <button class="ctrl song-ctrl" id="btn-ab"  onclick="loadSong('ab')">▸ Ab maj</button>
  <button class="ctrl song-ctrl" id="btn-bb"  onclick="loadSong('bb')">▸ Bb min</button>
  <button class="ctrl song-ctrl" id="btn-cof" onclick="loadSong('cof')">▸ Child of Fallacy</button>
  <div class="sep"></div>
  <button class="ctrl" id="pause-btn" onclick="togglePause()">⏸</button>
  <button class="ctrl" id="straight-btn" onclick="straightenEdges()">— straight</button>
  <button class="ctrl" id="toggle-bg-btn" onclick="toggleBackground()">◑ toggle</button>
  <button class="ctrl" onclick="exportData()">↓</button>
  <button class="ctrl" onclick="resetAll()">↺</button>
  <div class="sep"></div>
  <div id="speed-wrap">
    <span>spd</span>
    <input type="range" class="spd" min="25" max="800" value="100" id="spd"
      oninput="playbackSpeed=+this.value/100;document.getElementById('spd-lbl').textContent=playbackSpeed.toFixed(1).replace(/\.0$/,'')+'x'">
    <span id="spd-lbl">1x</span>
  </div>
</div>
<script>
// ═══════════════════════════════
//  SPECTRAL MAPPING
// ═══════════════════════════════
function nmToRGB(nm){
  let r=0,g=0,b=0;
  if(nm>=380&&nm<440){r=(440-nm)/60;g=0;b=1;}
  else if(nm>=440&&nm<490){r=0;g=(nm-440)/50;b=1;}
  else if(nm>=490&&nm<510){r=0;g=1;b=(510-nm)/20;}
  else if(nm>=510&&nm<580){r=(nm-510)/70;g=1;b=0;}
  else if(nm>=580&&nm<645){r=1;g=(645-nm)/65;b=0;}
  else if(nm>=645&&nm<=780){r=1;g=0;b=0;}
  let fac=1;
  if(nm>=380&&nm<420)fac=0.25+0.75*(nm-380)/40;
  const boost=0.80;
  r=Math.min(255,Math.round(255*Math.pow(r*fac,boost)));
  g=Math.min(255,Math.round(255*Math.pow(g*fac,boost)));
  b=Math.min(255,Math.round(255*Math.pow(b*fac,boost)));
  return{r,g,b,hex:'#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join(''),int:(r<<16)|(g<<8)|b};
}
const NOTES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const IS_SHARP=[false,true,false,true,false,false,true,false,true,false,true,false];
const NOTE_NM=Array.from({length:12},(_,i)=>700-i*(290/11));
const NOTE_SPEC=NOTE_NM.map(nmToRGB);
const NOTE_HEX=NOTE_SPEC.map(s=>s.hex);
const NOTE_INT=NOTE_SPEC.map(s=>s.int);
const NOTE_THZ=NOTE_NM.map(nm=>Math.round(299792/nm));

// ═══════════════════════════════
//  GEOMETRY
// ═══════════════════════════════
// Fixed ring radius — spokes never move
const RING_R = 4.2;
// Max pole height — A rises to +MAX_H, B sinks to -MAX_H over full song
const MAX_H  = 8.0;

// Fixed final pole positions — spokes never change direction
const APEX_FINAL  = new THREE.Vector3(0,  MAX_H, 0);
const NADIR_FINAL = new THREE.Vector3(0, -MAX_H, 0);

function noteAngle(i){ return (i/12)*Math.PI*2 - Math.PI/2; }

// Fixed position of note i on the ring (Y=0, never changes)
function ringVert(i){
  const a=noteAngle(i);
  return new THREE.Vector3(Math.cos(a)*RING_R, 0, Math.sin(a)*RING_R);
}
const RING_VERTS = Array.from({length:12},(_,i)=>ringVert(i));

// P center — fixed origin
const P = new THREE.Vector3(0,0,0);

// A and B positions at progress t (0→1)
function aPos(t){ return new THREE.Vector3(0,  MAX_H*t, 0); }
function bPos(t){ return new THREE.Vector3(0, -MAX_H*t, 0); }

// Where a note's ridge vertex lands at progress t
// Slides from ring position (t=0) up/down fixed spoke to final pole (t=1)
function vertexPos(noteIdx, t){
  const rv   = RING_VERTS[noteIdx];
  const pole = IS_SHARP[noteIdx] ? NADIR_FINAL : APEX_FINAL;
  return new THREE.Vector3(
    rv.x + (pole.x - rv.x) * t,
    rv.y + (pole.y - rv.y) * t,
    rv.z + (pole.z - rv.z) * t
  );
}

// ═══════════════════════════════
//  THREE SETUP
// ═══════════════════════════════
function VW(){return window.innerWidth;}
function VH(){return window.innerHeight-62;}

const threeCanvas=document.getElementById('three-canvas');
const renderer=new THREE.WebGLRenderer({canvas:threeCanvas,antialias:true,alpha:false});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(VW(),VH());
renderer.setClearColor(0x010204,1);

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(42,VW()/VH(),0.01,500);
camera.position.set(0,2,16);
camera.lookAt(0,0,0);

let zoomDist=16;
threeCanvas.addEventListener('wheel',e=>{
  e.preventDefault();
  zoomDist=Math.max(1,Math.min(150,zoomDist*Math.pow(1.001,e.deltaY)));
},{passive:false});

const group=new THREE.Group();
group.rotation.z = Math.PI / 2;
scene.add(group);

// Lights for stone material
const ambientLight = new THREE.AmbientLight(0x223344, 0.6);
scene.add(ambientLight);
const keyLight = new THREE.DirectionalLight(0xffeedd, 1.2);
keyLight.position.set(5, 8, 6);
scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0x334466, 0.5);
fillLight.position.set(-4, -3, -5);
scene.add(fillLight);
const rimLight = new THREE.DirectionalLight(0xffd080, 0.4);
rimLight.position.set(0, -8, 3);
scene.add(rimLight);

// ═══════════════════════════════
//  SKELETON — split into parts
// ═══════════════════════════════

// 1. WHITE POLE: A→B (dynamic, updates each frame)
const polePts = new Float32Array(6);
const poleGeo = new THREE.BufferGeometry();
poleGeo.setAttribute('position', new THREE.BufferAttribute(polePts, 3));
poleGeo.setDrawRange(0, 2);
const poleMat = new THREE.LineBasicMaterial({color:0xffffff, transparent:true, opacity:0.6});
group.add(new THREE.Line(poleGeo, poleMat));

function updatePole(t){
  const ap=aPos(t), bp=bPos(t);
  polePts[0]=ap.x; polePts[1]=ap.y; polePts[2]=ap.z;
  polePts[3]=bp.x; polePts[4]=bp.y; polePts[5]=bp.z;
  poleGeo.attributes.position.needsUpdate=true;
}
updatePole(0);

// 2. RING EDGES: fixed, always dim
{
  const pts=[];
  for(let i=0;i<12;i++){
    const a=RING_VERTS[i], b=RING_VERTS[(i+1)%12];
    pts.push(a.x,a.y,a.z, b.x,b.y,b.z);
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(pts,3));
  group.add(new THREE.LineSegments(geo, new THREE.LineBasicMaterial({color:0x0d1e2a,transparent:true,opacity:0.5})));
}

// 3. A-SPOKES and B-SPOKES: ring→A and ring→B (dynamic, dim)
const spokePts = new Float32Array(12*2*2*3); // 12 notes × 2 poles × 2 verts × 3 coords
const spokeGeo = new THREE.BufferGeometry();
spokeGeo.setAttribute('position', new THREE.BufferAttribute(spokePts, 3));
spokeGeo.setDrawRange(0, 12*2*2);
group.add(new THREE.LineSegments(spokeGeo, new THREE.LineBasicMaterial({color:0x0d1e2a,transparent:true,opacity:0.4})));

function updateSpokes(t){
  let o=0;
  const ap=aPos(t), bp=bPos(t);
  for(let i=0;i<12;i++){
    const rv=RING_VERTS[i];
    spokePts[o++]=rv.x;spokePts[o++]=rv.y;spokePts[o++]=rv.z;
    spokePts[o++]=ap.x;spokePts[o++]=ap.y;spokePts[o++]=ap.z;
  }
  for(let i=0;i<12;i++){
    const rv=RING_VERTS[i];
    spokePts[o++]=rv.x;spokePts[o++]=rv.y;spokePts[o++]=rv.z;
    spokePts[o++]=bp.x;spokePts[o++]=bp.y;spokePts[o++]=bp.z;
  }
  spokeGeo.attributes.position.needsUpdate=true;
}
updateSpokes(0);

// 4. NOTE SPOKES: P→ring, one per note, hidden until first use
const noteSpokes = Array.from({length:12}, (_,i)=>{
  const geo = new THREE.BufferGeometry().setFromPoints([P.clone(), RING_VERTS[i].clone()]);
  const mat = new THREE.LineBasicMaterial({color:NOTE_INT[i], transparent:true, opacity:0});
  const line = new THREE.Line(geo, mat);
  group.add(line);
  return {line, mat};
});

function litNoteSpokeFirstUse(noteIdx){
  if(noteSpokes[noteIdx].mat.opacity === 0){
    noteSpokes[noteIdx].mat.opacity = 0.5;
    noteSpokes[noteIdx].mat._wasLit = true;
  }
}

// legacy ref so resetAll can clear them
function resetSkeletonSpokes(){
  noteSpokes.forEach(({mat})=>mat.opacity=0);
}

// skelMat ref used in isolateThread — point to poleMat instead
const skelMat = poleMat;

// ═══════════════════════════════
//  NODE SPHERES
// ═══════════════════════════════
function mkS(r,col,op){
  return new THREE.Mesh(
    new THREE.SphereGeometry(r,14,9),
    new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:op})
  );
}
const aSphere=mkS(0.24,0xffffff,0.0); aSphere.position.copy(P); group.add(aSphere);
const bSphere=mkS(0.24,NOTE_INT[11],0.0); bSphere.position.copy(P); group.add(bSphere);
const pSphere=mkS(0.18,0xe6ff50,0.85); pSphere.position.copy(P); group.add(pSphere);
const noteSpheres=Array.from({length:12},(_,i)=>{
  const m=mkS(0.12,NOTE_INT[i],0.18);
  m.position.copy(RING_VERTS[i]); group.add(m); return m;
});

// Needle
const needle=mkS(0.20,0xffee44,0.0);
needle.position.copy(P); group.add(needle);
let needlePos=P.clone();
let needleTarget=null;

// ═══════════════════════════════
//  RIDGE SYSTEM
// ═══════════════════════════════
// ridgeVerts[i] = array of planted {pos,t,ms}
const ridgeVerts=Array.from({length:12},()=>[]);
const visitCount=new Array(12).fill(0);
const pulseBirth=new Array(12).fill(-9999);
// Ridge lines (per-note mountain)
const ridgeLines=[]; // {line,mat,noteIdx}
// Needle trail lines (cross-note trace)
const needleTrail=[];
let needlePrevPos=null;

// Per-note tracer — connects centroids of each stair step within the same note
const lastStepCentroid = new Array(12).fill(null);
const tracerLines = [];

// All centroid positions visited by the tracer, in order (global, for needle jumping)
const tracerVerts = [];
// Per-note centroid history and edge lines
const noteTracerVerts = Array.from({length:12}, ()=>[]);
const tracerEdges = [];

function addTracerEdge(from, to, col){
  const geo = new THREE.BufferGeometry().setFromPoints([from.clone(), to.clone()]);
  const mat = new THREE.LineBasicMaterial({color:col, transparent:true, opacity:0.9, depthWrite:false});
  const line = new THREE.Line(geo, mat);
  group.add(line);
  tracerEdges.push({line, mat});
}

function computeStepCentroid(noteIdx, pos, polePoint, prevPolePoint){
  // The stair step polygon has these corners:
  //   pos           (spoke vertex — new step top)
  //   polePoint     (pole at same height as pos)
  //   prevPolePoint (pole at previous step height)
  //   bottom        (spoke x,z at previous step height)
  const bottom = new THREE.Vector3(pos.x, prevPolePoint.y, pos.z);
  return new THREE.Vector3(
    (pos.x + polePoint.x + prevPolePoint.x + bottom.x) / 4,
    (pos.y + polePoint.y + prevPolePoint.y + bottom.y) / 4,
    (pos.z + polePoint.z + prevPolePoint.z + bottom.z) / 4
  );
}

// legacy — no longer used for chord grouping, kept for reset cleanup
const chordBuffer = [];
let chordFlushTimer = null;

// Ring polygon — last played ring position per group
let lastNaturalRing = null;
let lastSharpRing   = null;

// Staircase state — tracks last pole contact point per note
const lastPolePoint = new Array(12).fill(null);

function updateRingPolygon(noteIdx){
  const isSharp = IS_SHARP[noteIdx];
  const last    = isSharp ? lastSharpRing : lastNaturalRing;

  if(last !== null && last !== noteIdx){
    const v1  = RING_VERTS[last];
    const v2  = RING_VERTS[noteIdx];
    const col = NOTE_INT[noteIdx];
    const geo = new THREE.BufferGeometry().setFromPoints([v1.clone(), v2.clone()]);
    const mat = new THREE.LineBasicMaterial({
      color: col, transparent: true, opacity: 0.6, depthWrite: false
    });
    const line = new THREE.Line(geo, mat);
    group.add(line);
    ridgeLines.push({line, mat, noteIdx});
  }

  if(isSharp) lastSharpRing   = noteIdx;
  else        lastNaturalRing = noteIdx;
}

function plantVertex(noteIdx, t, ms){
  const pos = vertexPos(noteIdx, t);            // point on spoke at height t
  const polePoint = new THREE.Vector3(0, pos.y, 0); // same height on pole
  const path = ridgeVerts[noteIdx];
  const col  = NOTE_INT[noteIdx];

  // Stem — ring up to spoke vertex (dim, shows reach)
  {
    const rv  = RING_VERTS[noteIdx];
    const geo = new THREE.BufferGeometry().setFromPoints([rv.clone(), pos.clone()]);
    const mat = new THREE.LineBasicMaterial({color:col, transparent:true, opacity:0.22, depthWrite:false});
    const line = new THREE.Line(geo,mat); group.add(line);
    ridgeLines.push({line,mat,noteIdx});
  }

  // Tread — spoke vertex across to pole at same height
  {
    const geo = new THREE.BufferGeometry().setFromPoints([pos.clone(), polePoint.clone()]);
    const mat = new THREE.LineBasicMaterial({color:col, transparent:true, opacity:0.65, depthWrite:false});
    const line = new THREE.Line(geo,mat); group.add(line);
    ridgeLines.push({line,mat,noteIdx});
  }

  // Riser — straight up at spoke x,z from previous step to this vertex
  if(lastPolePoint[noteIdx]){
    const bottom = new THREE.Vector3(pos.x, lastPolePoint[noteIdx].y, pos.z);
    const geo = new THREE.BufferGeometry().setFromPoints([bottom.clone(), pos.clone()]);
    const mat = new THREE.LineBasicMaterial({color:col, transparent:true, opacity:0.5, depthWrite:false});
    const line = new THREE.Line(geo,mat); group.add(line);
    ridgeLines.push({line,mat,noteIdx});
  }

  // Outer edge — connect previous spoke vertex to this one (the staircase silhouette)
  if(path.length >= 2){
    const prevPos = path[path.length-2].pos;
    const geo = new THREE.BufferGeometry().setFromPoints([prevPos.clone(), pos.clone()]);
    const mat = new THREE.LineBasicMaterial({color:col, transparent:true, opacity:0.9, depthWrite:false});
    const line = new THREE.Line(geo, mat);
    group.add(line);
    ridgeLines.push({line, mat, noteIdx});
  }

  lastPolePoint[noteIdx] = polePoint.clone();
  path.push({pos:pos.clone(),t,ms});
  visitCount[noteIdx]++;
  litNoteSpokeFirstUse(noteIdx);
  updateRingPolygon(noteIdx);

  // Single global tracer — jumps to centroid of this new stair step
  if(path.length >= 2){
    const prevPos   = path[path.length-2].pos;
    const prevPoleV = new THREE.Vector3(0, prevPos.y, 0);
    const centroid  = computeStepCentroid(noteIdx, pos, polePoint, prevPoleV);

    // Needle jumps here (global)
    needleTarget = {pos: centroid.clone(), birth: performance.now()};

    // Global thread — the visible tracer structure building during playback
    if(lastStepCentroid[0]){
      const geo = new THREE.BufferGeometry().setFromPoints([lastStepCentroid[0].clone(), centroid.clone()]);
      const mat = new THREE.LineBasicMaterial({color:0xffee44, transparent:true, opacity:0.45, depthWrite:false});
      const line = new THREE.Line(geo, mat);
      group.add(line);
      tracerLines.push({line, mat});
    }
    lastStepCentroid[0] = centroid.clone();
    tracerVerts.push(centroid.clone());

    // Per-note edge — yellow outline connecting same-note centroids (toggleable after song)
    const nv = noteTracerVerts[noteIdx];
    if(nv.length > 0){
      addTracerEdge(nv[nv.length-1], centroid, 0xffee44);
    }
    nv.push(centroid.clone());
  }

  pulseBirth[noteIdx]=performance.now();
}

// Flash
const flashes=[];
function addFlash(v1,v2,col,dur=500){
  const geo=new THREE.BufferGeometry().setFromPoints([v1.clone(),v2.clone()]);
  const mat=new THREE.LineBasicMaterial({color:col,transparent:true,opacity:1,blending:THREE.AdditiveBlending,depthWrite:false});
  group.add(new THREE.Line(geo,mat));
  flashes.push({line:group.children[group.children.length-1],mat,birth:performance.now(),dur});
}

// ═══════════════════════════════
//  PLAYBACK
// ═══════════════════════════════
let songData=[], totalDuration=0, playhead=0;
let isPlaying=false, lastTick=0, playbackSpeed=1.0;
let pendingNotes=[], songComplete=false, isIsolated=false;
let currentSongKey=null, songStartWall=0;

function triggerNote(noteIdx){
  const t=totalDuration>0?Math.min(1,playhead/totalDuration):0;
  const pole=IS_SHARP[noteIdx]?bPos(t):aPos(t);
  addFlash(pole, RING_VERTS[noteIdx], NOTE_INT[noteIdx], 400);
  addFlash(RING_VERTS[noteIdx], vertexPos(noteIdx,t), NOTE_INT[noteIdx], 300);
  plantVertex(noteIdx, t, Math.round(playhead));
  const btn=document.querySelectorAll('.note-btn')[noteIdx];
  if(btn){btn.classList.add('lit');setTimeout(()=>btn.classList.remove('lit'),280);}
}

function advancePlayback(now){
  if(!isPlaying)return;
  const dt=(now-lastTick)*playbackSpeed;
  lastTick=now;
  playhead+=dt;
  while(pendingNotes.length&&pendingNotes[0][0]<=playhead){
    triggerNote(pendingNotes.shift()[1]);
  }
  if(playhead>=totalDuration&&!songComplete){
    songComplete=true;isPlaying=false;
    document.getElementById('pause-btn').textContent='▶';
    setStatus('complete — drag to explore  ◈ thread only');
  }
}

function playSong(data,dur,key){
  resetAll();
  songData=data; totalDuration=dur; currentSongKey=key;
  pendingNotes=[...data].sort((a,b)=>a[0]-b[0]);
  playhead=0; isPlaying=true; lastTick=performance.now(); songComplete=false;
  document.getElementById('pause-btn').textContent='⏸';
  setStatus('building…');
}

function togglePause(){
  if(!songData.length)return;
  isPlaying=!isPlaying;
  if(isPlaying){lastTick=performance.now();document.getElementById('pause-btn').textContent='⏸';setStatus('building…');}
  else{document.getElementById('pause-btn').textContent='▶';setStatus('paused');}
}

function setStatus(t){document.getElementById('status').textContent=t;}

// ═══════════════════════════════
//  SONGS
// ═══════════════════════════════
function genAbMajor(){
  const e=[];
  [8,0,3,8,0,3,8,0,3,1,5,8,1,5,8,3,7,10,3,7,10,8,0,3].forEach((n,i)=>e.push([i*490+80,n]));
  [{t:12000,ch:[8,0,3]},{t:14400,ch:[1,5,8]},{t:16800,ch:[3,7,10]},
   {t:19200,ch:[0,3,7]},{t:21600,ch:[5,8,0]},{t:24000,ch:[10,1,5]},{t:26400,ch:[8,0,3]}
  ].forEach(({t,ch})=>{
    ch.forEach((n,j)=>{e.push([t+j*130,n]);e.push([t+j*130+750,n]);});
    e.push([t+450,ch[2]],[t+1000,ch[0]]);
  });
  [8,10,0,1,3,5,7,8,10,0,1,3,5,7,8,0,3,7].forEach((n,i)=>e.push([28000+i*430,n]));
  [[8,0,3],[1,5,8],[3,7,10],[8,0,3]].forEach(([a,b,c],i)=>{const o=28000+i*2000;e.push([o,a],[o+110,b],[o+220,c]);});
  const pk=[8,10,0,1,3,5,7];
  for(let i=0;i<52;i++)e.push([36000+i*150,pk[i%7]]);
  for(let i=0;i<10;i++)e.push([36060+i*800,8]);

function genBbMinor(){

  [{t:12000,ch:[10,1,5]},{t:14400,ch:[8,0,3]},{t:16800,ch:[6,10,1]},
   {t:19200,ch:[3,6,10]},{t:21600,ch:[5,8,0]},{t:24000,ch:[1,5,8]},{t:26400,ch:[10,1,5]}
  ].forEach(({t,ch})=>{
    ch.forEach((n,j)=>{e.push([t+j*130,n]);e.push([t+j*130+750,n]);});
    e.push([t+450,ch[2]],[t+1000,ch[0]]);

  [10,0,1,3,5,6,8,10,0,1,3,5,6,8,10,1,5,8].forEach((n,i)=>e.push([28000+i*430,n]));
  const pk=[10,0,1,3,5,6,8];
  for(let i=0;i<52;i++)e.push([36000+i*150,pk[i%7]]);
  for(let i=0;i<10;i++)e.push([36060+i*800,10]);
  for(let i=0;i<8;i++) e.push([36090+i*900,5]);
  [[10,1,5],[8,0,3],[6,10,1],[10,1,5],[10,1,5]].forEach(([a,b,c],i)=>{const o=44000+i*2000;e.push([o,a],[o+180,b],[o+360,c],[o+900,a],[o+1400,c]);});

function straightenEdges(){
  const btn = document.getElementById('straight-btn');
  btn.classList.toggle('active');
  const isOn = btn.classList.contains('active');

  if(isOn){
    // Hide accumulated per-note edges
    tracerEdges.forEach(({mat, closing}) => { if(!closing) mat.opacity = 0; });

    // For each note: one straight line from first centroid to last centroid
    noteTracerVerts.forEach((verts, ni) => {
      if(verts.length < 2) return;
      const geo = new THREE.BufferGeometry().setFromPoints([verts[0].clone(), verts[verts.length-1].clone()]);
      const mat = new THREE.LineBasicMaterial({color:0xffee44, transparent:true, opacity:0.9, depthWrite:false});
      const line = new THREE.Line(geo, mat);
      group.add(line);
      tracerEdges.push({line, mat, closing:true});
    });
    setStatus('straightened');
  } else {
    for(let i=tracerEdges.length-1; i>=0; i--){
      if(tracerEdges[i].closing){ group.remove(tracerEdges[i].line); tracerEdges.splice(i,1); }
    }
    tracerEdges.forEach(({mat}) => mat.opacity = 0.9);
    setStatus('');
  }
}

  bgVisible = !bgVisible;

  skelMat.opacity          = bgVisible ? 0.6  : 0;
  poleMat.opacity          = bgVisible ? 0.6  : 0;

  bSphere.material.opacity = bgVisible ? 0.75 : 0;
  pSphere.material.opacity = bgVisible ? 0.85 : 0;
  noteSpheres.forEach(m => m.material.opacity = bgVisible ? 0.65 : 0);
  needle.material.opacity  = bgVisible ? 0.6  : 0;
  noteSpokes.forEach(({mat}) => { mat.opacity = bgVisible ? (mat._wasLit ? 0.5 : 0) : 0; });
  ridgeLines.forEach(({mat}) => { if(bgVisible) mat.opacity = mat._savedOp ?? mat.opacity; else { mat._savedOp = mat.opacity; mat.opacity = 0; } });
  // tracerLines + tracerEdges are the tracer structure — always stay visible
  lcanvas.style.display    = bgVisible ? 'block' : 'none';
  setStatus(bgVisible ? '' : 'tracer only');
}

function isolateThread(){
  if(!ridgeLines.length){setStatus('no thread yet');return;}
  isIsolated=!isIsolated;
  const btn=document.querySelector('.ctrl[onclick="isolateThread()"]');
  if(isIsolated){
    skelMat.opacity=0;
    aSphere.material.opacity=0;bSphere.material.opacity=0;pSphere.material.opacity=0;
    noteSpheres.forEach(m=>m.material.opacity=0);
    needle.material.opacity=0;
    ridgeLines.forEach(({mat})=>{mat.opacity=Math.min(1,mat.opacity*1.8);});
    needleTrail.forEach(({mat})=>{mat.opacity=Math.min(1,mat.opacity*3);});
    tracerEdges.forEach(({mat})=>{ mat.opacity=1; });
    if(btn)btn.classList.add('active');
    setStatus('thread only — drag  scroll=zoom  ◈ restore');
  } else {
    skelMat.opacity=0.55;
    const t=totalDuration>0?Math.min(1,playhead/totalDuration):0;
    aSphere.material.opacity=t>0.01?0.8:0;
    bSphere.material.opacity=t>0.01?0.75:0;
    pSphere.material.opacity=0.85;
    noteSpheres.forEach(m=>m.material.opacity=0.18);
    needle.material.opacity=0.6;
    if(btn)btn.classList.remove('active');
    setStatus('');
  }
}

function exportData(){
  if(visitCount.every(v=>v===0)){setStatus('nothing to export');return;}
  const allPts=ridgeVerts.flatMap((path,ni)=>path.map(v=>({...v,noteIdx:ni,note:NOTES[ni]})));
  allPts.sort((a,b)=>a.ms-b.ms);
  let pathLen=0;
  allPts.forEach((p,i)=>{if(i>0){const q=allPts[i-1];pathLen+=p.pos.distanceTo(q.pos);}});
  const maxV=Math.max(...visitCount,1);
  const out={
    meta:{generated:new Date().toISOString(),song:currentSongKey,totalDurationMs:totalDuration,
      totalVertices:allPts.length,pathLength:+pathLen.toFixed(4),
      dominant:NOTES[visitCount.indexOf(maxV)],dominantCount:maxV,
      present:NOTES.filter((_,i)=>visitCount[i]>0).join(' '),
      absent:NOTES.filter((_,i)=>visitCount[i]===0).join(' '),
      ringRadius:RING_R,maxPoleHeight:MAX_H},
    noteDistribution:Object.fromEntries(NOTES.map((n,i)=>[n,{visits:visitCount[i],nm:+NOTE_NM[i].toFixed(1),sharp:IS_SHARP[i],thz:NOTE_THZ[i]}])),
    ridges:Object.fromEntries(NOTES.map((n,i)=>[n,ridgeVerts[i].map(v=>({x:+v.pos.x.toFixed(4),y:+v.pos.y.toFixed(4),z:+v.pos.z.toFixed(4),t:+v.t.toFixed(5),ms:v.ms}))]))
  };
  const blob=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='harmonic_crystal.json';a.click();
  setStatus('exported '+allPts.length+' vertices');
}

function project(v3){
  const wv=v3.clone();group.localToWorld(wv);

function drawLabels(t){
  lctx.clearRect(0,0,lcanvas.width,lcanvas.height);
  if(isIsolated)return;
  lctx.textAlign='center';lctx.textBaseline='middle';

  // Spectrum strip top
  const sw=lcanvas.width,sh=8;
  const grad=lctx.createLinearGradient(0,0,sw,0);
  NOTE_SPEC.forEach((s,i)=>grad.addColorStop(i/11,`rgba(${s.r},${s.g},${s.b},${visitCount[i]>0?0.85:0.12})`));
  lctx.fillStyle=grad;lctx.fillRect(0,0,sw,sh);

  // A pole label
  if(t>0.01){
    const pa=project(aPos(t));
    if(!pa.behind){
      lctx.font='400 10px JetBrains Mono';lctx.fillStyle='rgba(255,255,255,0.8)';
      lctx.fillText('A',pa.x,pa.y-24);
      lctx.font='300 7px JetBrains Mono';lctx.fillStyle='rgba(255,255,255,0.28)';
      lctx.fillText('naturals',pa.x,pa.y-13);
    }
    const pb=project(bPos(t));
    if(!pb.behind){
      const s=NOTE_SPEC[11];
      lctx.font='400 10px JetBrains Mono';lctx.fillStyle=`rgba(${s.r},${s.g},${s.b},0.85)`;
      lctx.fillText('B',pb.x,pb.y+24);
      lctx.font='300 7px JetBrains Mono';lctx.fillStyle=`rgba(${s.r},${s.g},${s.b},0.3)`;
      lctx.fillText('sharps',pb.x,pb.y+35);
    }
  }

  // P label
  const pp=project(P);
  if(!pp.behind){
    lctx.font='300 7px JetBrains Mono';lctx.fillStyle='rgba(230,255,80,0.45)';
    lctx.fillText('P',pp.x+14,pp.y);
  }

  // Note labels at ring
  for(let i=0;i<12;i++){
    const p=project(RING_VERTS[i]);if(p.behind)continue;
    const s=NOTE_SPEC[i];const hit=visitCount[i]>0;
    const ang=noteAngle(i);
    const ox=Math.cos(ang)*22,oy=Math.sin(ang)*10;
    lctx.font=`${hit?'500':'300'} 9px JetBrains Mono`;
    lctx.fillStyle=`rgba(${s.r},${s.g},${s.b},${hit?0.9:0.18})`;
    lctx.fillText(NOTES[i],p.x+ox,p.y+oy);
    if(hit){
      lctx.font='300 6px JetBrains Mono';
      lctx.fillStyle=`rgba(${s.r},${s.g},${s.b},0.4)`;
      lctx.fillText(visitCount[i]+'x',p.x+ox,p.y+oy+10);
    }
  }

  // Progress bar
  if(totalDuration>0){
    const pw=lcanvas.width-24,ph=2,px=12,py=lcanvas.height-10;
    lctx.fillStyle='rgba(255,255,255,0.05)';lctx.fillRect(px,py,pw,ph);
    lctx.fillStyle='rgba(255,238,68,0.5)';lctx.fillRect(px,py,pw*Math.min(1,playhead/totalDuration),ph);
    const fmt=ms=>{const s=Math.floor(ms/1000);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');};
    lctx.font='300 8px JetBrains Mono';lctx.fillStyle='rgba(255,238,68,0.3)';
    lctx.textAlign='left';lctx.fillText(fmt(playhead),px,py-6);
    lctx.textAlign='right';lctx.fillText(fmt(totalDuration),px+pw,py-6);
  }

  // Stats panel top-right
  if(visitCount.some(v=>v>0)){
    const maxV=Math.max(...visitCount,1);
    const mvIdx=visitCount.indexOf(maxV);
    const total=visitCount.reduce((a,b)=>a+b,0);
    const upV=visitCount.filter((_,j)=>!IS_SHARP[j]).reduce((s,v)=>s+v,0);
    const loV=visitCount.filter((_,j)=> IS_SHARP[j]).reduce((s,v)=>s+v,0);
    const lines=[
      ['rgba(255,255,255,0.12)','CRYSTAL'],
      ['rgba(255,238,68,0.65)', NOTES[mvIdx]+' dominant  '+maxV+'x'],
      ['rgba(255,255,255,0.22)',total+' vertices total'],
      ['rgba(255,255,255,0.18)','nat '+upV+'  sharp '+loV],
      ['rgba(255,255,255,0.1)', 'absent: '+( NOTES.filter((_,i)=>visitCount[i]===0).join(' ')||'none')],
      ['rgba(255,255,255,0.1)', 't='+(Math.min(1,playhead/(totalDuration||1))*100).toFixed(1)+'%'],
    ];
    lctx.textAlign='right';lctx.textBaseline='middle';
    lines.forEach(([col,txt],i)=>{
      lctx.font=i===0?'500 8px JetBrains Mono':'300 8px JetBrains Mono';
      lctx.fillStyle=col;lctx.fillText(txt,lcanvas.width-10,30+i*13);
    });
  }
}

function animate(now){
  requestAnimationFrame(animate);
  advancePlayback(now);

  const t=totalDuration>0?Math.min(1,playhead/totalDuration):0;

  // Camera zoom
  const camDir=camera.position.clone().normalize();
  camera.position.copy(camDir.multiplyScalar(zoomDist));
  camera.lookAt(0,0,0);

  group.rotation.x=rotX;group.rotation.y=rotY;
  group.updateMatrixWorld(true);

  // Update skeleton
  updatePole(t);
  updateSpokes(t);

  // Poles
  const ap=aPos(t),bp=bPos(t);
  aSphere.position.copy(ap);bSphere.position.copy(bp);
  if(bgVisible){
    aSphere.material.opacity=t>0.005?(0.55+0.28*Math.sin(now*0.002)):0;
    bSphere.material.opacity=t>0.005?(0.5+0.22*Math.sin(now*0.0015+1.1)):0;
    pSphere.material.opacity=0.6+0.25*Math.sin(now*0.0022+0.4);
  }
  aSphere.scale.setScalar(1+0.08*Math.sin(now*0.002));
  bSphere.scale.setScalar(1+0.07*Math.sin(now*0.0015+1.1));

  // Note spheres
  for(let i=0;i<12;i++){
    const age=(now-pulseBirth[i])/700;
    if(bgVisible){
      if(age<1){
        const ease=Math.pow(1-age,2);
        noteSpheres[i].scale.setScalar(1+ease*0.9);
        noteSpheres[i].material.opacity=visitCount[i]>0?0.8+ease*0.2:0.18+ease*0.7;
      } else {
        noteSpheres[i].scale.setScalar(1);
        noteSpheres[i].material.opacity=visitCount[i]>0?0.65:0.18;
      }
    }
  }

  // Needle
  if(bgVisible){
    if(needleTarget){
      needlePos.lerp(needleTarget.pos,0.18);
      needle.position.copy(needlePos);
      needle.material.opacity=0.8+0.18*Math.sin(now*0.005);
      if(needlePos.distanceTo(needleTarget.pos)<0.01)needleTarget=null;
    } else if(visitCount.some(v=>v>0)){
      needle.material.opacity=0.5+0.28*Math.sin(now*0.003);
    }
  } else {
    // still move needle silently so it stays in position
    if(needleTarget){
      needlePos.lerp(needleTarget.pos,0.18);
      needle.position.copy(needlePos);
      if(needlePos.distanceTo(needleTarget.pos)<0.01)needleTarget=null;
    }
  }
  needle.scale.setScalar(1+0.16*Math.sin(now*0.0038));

  // Flashes
  for(let i=flashes.length-1;i>=0;i--){
    const f=flashes[i];
    const ft=(now-f.birth)/f.dur;
    if(ft>=1){group.remove(f.line);flashes.splice(i,1);}
    else f.mat.opacity=Math.pow(1-ft,1.4)*0.95;
  }

  renderer.render(scene,camera);
  drawLabels(t);
}
