function updateHUD() {
  document.getElementById('zlbl').textContent = CAM.zoom.toFixed(0) + 'px/AU  SCROLL\u00B7PINCH\u00B7DRAG';

  // Transit overlay
  if (G.traveling) {
    const t = G.travel;
    const rem = t.earthDays * (1 - t.prog);
    document.getElementById('transit').style.display = 'block';
    document.getElementById('tr-dest').textContent = BODIES[t.to].name;
    document.getElementById('tr-prog').style.width = (t.prog * 100).toFixed(1) + '%';
    document.getElementById('tr-dist').textContent = t.distAU.toFixed(3) + ' AU';
    document.getElementById('tr-etime').textContent = 'Earth remaining: ' + fmtT(rem);
    document.getElementById('tr-stime').textContent = 'Ship time: ' + fmtT(t.shipDays);
    document.getElementById('tr-gamma').textContent = 'Lorentz \u03B3 = ' + t.gamma.toFixed(6);
  } else {
    document.getElementById('transit').style.display = 'none';
  }

  // Update all managed windows
  WM.updateAll();

  // Planet popup refreshes are triggered by game state changes only
}


// ───────────────────────────────────────────────────────────────
//  18. INPUT HANDLING
// ───────────────────────────────────────────────────────────────

const ptr = {
  down: false, startX: 0, startY: 0,
  lastX: 0, lastY: 0, moved: false,
  pinching: false, pinchDist: 0,
  pinchMidX: 0, pinchMidY: 0,
};

function cxy(cx, cy) {
  const r = canvas.getBoundingClientRect();
  return { x: (cx - r.left) * (canvas.width / r.width), y: (cy - r.top) * (canvas.height / r.height) };
}

// Hit detection: Body > Star > Asteroid > Nothing
function trySelect(cx, cy) {
  // Bodies
  let closest = null, closestD = Infinity;
  Object.entries(BODIES).forEach(([key, b]) => {
    const bp = bw(key), p = w2s(bp.x, bp.y);
    const d = Math.hypot(cx - p.x, cy - p.y);
    const hit = Math.max(b.r + 10, 22, 40 / Math.max(1, CAM.zoom * 0.3));
    if (d < hit && d < closestD) { closestD = d; closest = key; }
  });
  if (closest) {
    if (closest === 'earth') {
      // Toggle Earth status window focus
      const ew = WM.windows.get('earth-status');
      if (ew && ew.visible) {
        WM.focus('earth-status');
      } else {
        openEarthPopup();
      }
      return;
    }
    openPlanetPopup(closest);
    return;
  }

  // Named stars
  let starHit = null, starD = Infinity;
  NAMED_STARS.forEach(s => {
    const sw = { x: s.au * Math.cos(s.ang), y: s.au * Math.sin(s.ang) };
    const p = w2s(sw.x, sw.y);
    const d = Math.hypot(cx - p.x, cy - p.y);
    if (d < Math.max(s.r + 14, 20) && d < starD) { starD = d; starHit = s; }
  });
  if (starHit) { openPanel('star', starHit.name); return; }

  // Asteroids
  let astHit = null, astD = Infinity;
  ASTEROIDS.forEach(a => {
    const p = w2s(a.x, a.y);
    const d = Math.hypot(cx - p.x, cy - p.y);
    if (d < Math.max(a.r + 14, 18) && d < astD) { astD = d; astHit = a; }
  });
  if (astHit) { openPanel('asteroid', astHit.name); return; }

  closePanel();
}

// Mouse events
canvas.addEventListener('mousedown', e => {
  const p = cxy(e.clientX, e.clientY);
  Object.assign(ptr, { down: true, moved: false, startX: p.x, startY: p.y, lastX: p.x, lastY: p.y });
  canvas.classList.add('dragging');
});

window.addEventListener('mousemove', e => {
  if (!ptr.down) return;
  const p = cxy(e.clientX, e.clientY);
  CAM.x += p.x - ptr.lastX;
  CAM.y += p.y - ptr.lastY;
  ptr.lastX = p.x; ptr.lastY = p.y;
  if (Math.hypot(p.x - ptr.startX, p.y - ptr.startY) > 4) ptr.moved = true;
});

window.addEventListener('mouseup', e => {
  if (!ptr.down) return;
  ptr.down = false;
  canvas.classList.remove('dragging');
  if (!ptr.moved) {
    const p = cxy(e.clientX, e.clientY);
    trySelect(p.x, p.y);
  }
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const p = cxy(e.clientX, e.clientY);
  zoomAt(p.x, p.y, e.deltaY < 0 ? 1.12 : 1 / 1.12);
}, { passive: false });

// Touch helpers
function td(a, b) { return Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY); }
function tm(a, b) { return { x: (a.clientX + b.clientX) / 2, y: (a.clientY + b.clientY) / 2 }; }

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    const t = e.touches[0], p = cxy(t.clientX, t.clientY);
    Object.assign(ptr, { down: true, moved: false, pinching: false, startX: p.x, startY: p.y, lastX: p.x, lastY: p.y });
  } else if (e.touches.length === 2) {
    ptr.down = false;
    ptr.pinching = true;
    ptr.pinchDist = td(e.touches[0], e.touches[1]);
    const m = tm(e.touches[0], e.touches[1]);
    const p = cxy(m.x, m.y);
    ptr.pinchMidX = p.x; ptr.pinchMidY = p.y;
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (ptr.pinching && e.touches.length === 2) {
    const nd = td(e.touches[0], e.touches[1]);
    const m = tm(e.touches[0], e.touches[1]);
    const p = cxy(m.x, m.y);
    CAM.x += p.x - ptr.pinchMidX;
    CAM.y += p.y - ptr.pinchMidY;
    zoomAt(p.x, p.y, nd / ptr.pinchDist);
    ptr.pinchDist = nd;
    ptr.pinchMidX = p.x; ptr.pinchMidY = p.y;
    ptr.moved = true;
  } else if (ptr.down && e.touches.length === 1) {
    const t = e.touches[0], p = cxy(t.clientX, t.clientY);
    CAM.x += p.x - ptr.lastX;
    CAM.y += p.y - ptr.lastY;
    ptr.lastX = p.x; ptr.lastY = p.y;
    if (Math.hypot(p.x - ptr.startX, p.y - ptr.startY) > 4) ptr.moved = true;
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (ptr.pinching) {
    if (e.touches.length < 2) ptr.pinching = false;
    return;
  }
  if (ptr.down && !ptr.moved) trySelect(ptr.startX, ptr.startY);
  ptr.down = false;
}, { passive: false });

// ───────────────────────────────────────────────────────────────
//  19. WINDOW MANAGER
// ───────────────────────────────────────────────────────────────

const WM = {
  windows: new Map(),
  tabGroups: new Map(),
  nextZ: 50,
  dragging: null,
  resizing: null,
  container: null,

  init() {
    this.container = document.getElementById('wm-container');

    // Global mouse/touch handlers for drag
    window.addEventListener('mousemove', e => this._onMove(e.clientX, e.clientY, e));
    window.addEventListener('mouseup', e => this._onUp(e));
    window.addEventListener('touchmove', e => {
      if (!this.dragging && !this.resizing) return;
      e.preventDefault();
      const t = e.touches[0];
      this._onMove(t.clientX, t.clientY, e);
    }, { passive: false });
    window.addEventListener('touchend', e => {
      if (!this.dragging && !this.resizing) return;
      this._onUp(e);
    });

    // Load saved layout
    this.loadLayout();
  },

  register(config) {
    const win = {
      id: config.id,
      title: config.title,
      x: config.x || 10,
      y: config.y || 10,
      w: config.w || null,
      h: config.h || null,
      collapsed: config.collapsed || false,
      visible: config.visible !== false,
      zIndex: this.nextZ++,
      tabGroup: null,
      pinned: config.pinned || false,
      el: null,
      bodyEl: null,
      titleEl: null,
      renderFn: config.renderFn || null,
      minW: config.minW || 140,
      minH: config.minH || 60,
      resizable: config.resizable !== false,
      badge: 0,
    };

    // Build DOM
    const root = document.createElement('div');
    root.className = 'gw-root' + (win.visible ? '' : ' gw-hidden');
    root.dataset.winId = win.id;
    root.style.zIndex = win.zIndex;
    root.style.left = win.x + 'px';
    root.style.top = win.y + 'px';
    if (win.w) root.style.width = win.w + 'px';

    // Title bar
    const titlebar = document.createElement('div');
    titlebar.className = 'gw-titlebar';
    titlebar.addEventListener('mousedown', e => this._onDown(win.id, e.clientX, e.clientY, e));
    titlebar.addEventListener('touchstart', e => {
      e.preventDefault();
      const t = e.touches[0];
      this._onDown(win.id, t.clientX, t.clientY, e);
    }, { passive: false });

    const title = document.createElement('span');
    title.className = 'gw-title';
    title.textContent = win.title;
    win.titleEl = title;

    const badge = document.createElement('span');
    badge.className = 'gw-badge';
    badge.dataset.badge = win.id;

    const controls = document.createElement('div');
    controls.className = 'gw-controls';

    const colBtn = document.createElement('span');
    colBtn.className = 'gw-ctrl-btn';
    colBtn.textContent = win.collapsed ? '\u25B6' : '\u25BC';
    colBtn.dataset.action = 'collapse';
    colBtn.addEventListener('click', e => { e.stopPropagation(); this.toggleCollapse(win.id); });

    controls.appendChild(colBtn);

    if (!win.pinned) {
      const closeBtn = document.createElement('span');
      closeBtn.className = 'gw-ctrl-btn';
      closeBtn.textContent = '\u00D7';
      closeBtn.addEventListener('click', e => { e.stopPropagation(); this.hide(win.id); });
      controls.appendChild(closeBtn);
    }

    titlebar.appendChild(title);
    titlebar.appendChild(badge);
    titlebar.appendChild(controls);

    // Tab bar (hidden initially)
    const tabBar = document.createElement('div');
    tabBar.className = 'gw-tab-bar';
    tabBar.style.display = 'none';

    // Body
    const body = document.createElement('div');
    body.className = 'gw-body';
    if (win.collapsed) body.style.display = 'none';
    if (win.h) body.style.maxHeight = win.h + 'px';

    // Resize handle
    const resize = document.createElement('div');
    resize.className = 'gw-resize-handle';
    resize.addEventListener('mousedown', e => { e.stopPropagation(); this._onResizeDown(win.id, e.clientX, e.clientY); });

    root.appendChild(titlebar);
    root.appendChild(tabBar);
    root.appendChild(body);
    if (win.resizable) root.appendChild(resize);

    win.el = root;
    win.bodyEl = body;
    win._tabBar = tabBar;
    win._colBtn = colBtn;

    this.windows.set(win.id, win);
    this.container.appendChild(root);

    // Initial render
    if (win.renderFn && win.visible && !win.collapsed) {
      win.renderFn(win.bodyEl);
    }

    return win;
  },

  focus(id) {
    const win = this.windows.get(id);
    if (!win) return;
    // Remove focused from all
    this.windows.forEach(w => w.el.classList.remove('gw-focused'));
    win.zIndex = this.nextZ++;
    win.el.style.zIndex = win.zIndex;
    win.el.classList.add('gw-focused');
  },

  show(id) {
    const win = this.windows.get(id);
    if (!win) return;
    win.visible = true;
    win.el.classList.remove('gw-hidden');
    this.focus(id);
    if (win.renderFn) win.renderFn(win.bodyEl);
  },

  hide(id) {
    const win = this.windows.get(id);
    if (!win) return;
    win.visible = false;
    win.el.classList.add('gw-hidden');
  },

  toggleCollapse(id) {
    const win = this.windows.get(id);
    if (!win) return;
    win.collapsed = !win.collapsed;
    win.bodyEl.style.display = win.collapsed ? 'none' : '';
    win._colBtn.textContent = win.collapsed ? '\u25B6' : '\u25BC';
    this.saveLayout();
  },

  setBadge(id, count) {
    const win = this.windows.get(id);
    if (!win) return;
    win.badge = count;
    const badge = win.el.querySelector('.gw-badge');
    if (badge) {
      badge.textContent = count > 0 ? count : '';
      badge.classList.toggle('visible', count > 0);
    }
  },

  // --- Tab system ---
  mergeToTabGroup(sourceId, targetId) {
    const src = this.windows.get(sourceId);
    const tgt = this.windows.get(targetId);
    if (!src || !tgt || sourceId === targetId) return;

    let groupId = tgt.tabGroup;
    if (!groupId) {
      groupId = 'tg_' + (this.tabGroups.size + 1);
      tgt.tabGroup = groupId;
      this.tabGroups.set(groupId, { winIds: [targetId], activeId: targetId });
    }

    const group = this.tabGroups.get(groupId);
    if (group.winIds.includes(sourceId)) return;

    // Remove from old group if any
    if (src.tabGroup) this.removeFromTabGroup(sourceId);

    src.tabGroup = groupId;
    group.winIds.push(sourceId);

    // Position source at target
    src.x = tgt.x; src.y = tgt.y;
    src.el.style.left = tgt.x + 'px';
    src.el.style.top = tgt.y + 'px';

    // Hide source body, show only active
    src.visible = true;
    src.el.classList.remove('gw-hidden');
    src.el.classList.add('gw-hidden');

    this._renderTabBars(groupId);
    this.saveLayout();
  },

  removeFromTabGroup(winId) {
    const win = this.windows.get(winId);
    if (!win || !win.tabGroup) return;

    const groupId = win.tabGroup;
    const group = this.tabGroups.get(groupId);
    if (!group) return;

    group.winIds = group.winIds.filter(id => id !== winId);
    win.tabGroup = null;

    if (group.winIds.length <= 1) {
      // Dissolve group
      const remainingId = group.winIds[0];
      if (remainingId) {
        const rem = this.windows.get(remainingId);
        rem.tabGroup = null;
        rem._tabBar.style.display = 'none';
        rem._tabBar.innerHTML = '';
        rem.el.classList.remove('gw-hidden');
      }
      this.tabGroups.delete(groupId);
    } else {
      if (group.activeId === winId) {
        group.activeId = group.winIds[0];
      }
      this._renderTabBars(groupId);
    }

    win._tabBar.style.display = 'none';
    win._tabBar.innerHTML = '';
    win.el.classList.remove('gw-hidden');
  },

  switchTab(groupId, winId) {
    const group = this.tabGroups.get(groupId);
    if (!group) return;
    group.activeId = winId;

    group.winIds.forEach(id => {
      const w = this.windows.get(id);
      if (id === winId) {
        w.el.classList.remove('gw-hidden');
        w.visible = true;
        if (w.renderFn) w.renderFn(w.bodyEl);
      } else {
        w.el.classList.add('gw-hidden');
      }
    });

    this._renderTabBars(groupId);
  },

  _renderTabBars(groupId) {
    const group = this.tabGroups.get(groupId);
    if (!group) return;

    group.winIds.forEach(id => {
      const w = this.windows.get(id);
      if (id !== group.activeId) return; // Only active window shows tab bar

      w._tabBar.style.display = 'flex';
      w._tabBar.innerHTML = '';

      group.winIds.forEach(tabId => {
        const tabWin = this.windows.get(tabId);
        const tab = document.createElement('span');
        tab.className = 'gw-tab' + (tabId === group.activeId ? ' gw-tab-active' : '');
        tab.textContent = tabWin.title;
        tab.addEventListener('click', () => this.switchTab(groupId, tabId));
        w._tabBar.appendChild(tab);
      });
    });
  },

  // --- Drag ---
  _onDown(id, cx, cy, e) {
    e.stopPropagation();
    const win = this.windows.get(id);
    if (!win) return;
    this.focus(id);
    this.dragging = { winId: id, offsetX: cx - win.x, offsetY: cy - win.y, moved: false };
  },

  _onMove(cx, cy, e) {
    if (this.resizing) {
      const win = this.windows.get(this.resizing.winId);
      if (!win) return;
      const nw = Math.max(win.minW, this.resizing.startW + (cx - this.resizing.startX));
      const nh = Math.max(win.minH, this.resizing.startH + (cy - this.resizing.startY));
      win.el.style.width = nw + 'px';
      win.bodyEl.style.maxHeight = (nh - 22) + 'px';
      win.w = nw;
      win.h = nh - 22;
      return;
    }
    if (!this.dragging) return;
    const d = this.dragging;
    const win = this.windows.get(d.winId);
    if (!win) return;

    const nx = cx - d.offsetX;
    const ny = cy - d.offsetY;

    // Clamp so title bar stays on screen
    win.x = Math.max(-win.el.offsetWidth + 40, Math.min(window.innerWidth - 40, nx));
    win.y = Math.max(0, Math.min(window.innerHeight - 22, ny));

    // On mobile, lock horizontal position to 0 (vertical-only dragging)
    if (IS_MOBILE) {
      win.x = 0;
      win.el.style.left = '0px';
    } else {
      win.el.style.left = win.x + 'px';
    }
    win.el.style.top = win.y + 'px';
    d.moved = true;

    // Tab merge hover detection
    this.windows.forEach((other, otherId) => {
      if (otherId === d.winId || !other.visible) return;
      other.el.classList.remove('gw-tab-merge-hover');
      const rect = other.el.getBoundingClientRect();
      if (cx > rect.left && cx < rect.right && cy > rect.top && cy < rect.top + 30) {
        other.el.classList.add('gw-tab-merge-hover');
      }
    });
  },

  _onUp(e) {
    if (this.resizing) {
      this.resizing = null;
      this.saveLayout();
      return;
    }
    if (!this.dragging) return;
    const d = this.dragging;
    this.dragging = null;

    // Check for tab merge
    if (d.moved) {
      const cx = d.winId;
      let merged = false;
      this.windows.forEach((other, otherId) => {
        other.el.classList.remove('gw-tab-merge-hover');
        if (otherId === cx || !other.visible || merged) return;
        const rect = other.el.getBoundingClientRect();
        const win = this.windows.get(cx);
        const winCx = win.x + win.el.offsetWidth / 2;
        const winCy = win.y + 11;
        if (winCx > rect.left && winCx < rect.right && winCy > rect.top && winCy < rect.top + 30) {
          this.mergeToTabGroup(cx, otherId);
          merged = true;
        }
      });
      this.saveLayout();
    }
  },

  _onResizeDown(id, cx, cy) {
    const win = this.windows.get(id);
    if (!win) return;
    this.focus(id);
    this.resizing = {
      winId: id,
      startX: cx, startY: cy,
      startW: win.el.offsetWidth,
      startH: win.el.offsetHeight,
    };
  },

  // --- Render all visible windows (throttled) ---
  _lastUpdate: 0,
  updateAll() {
    const now = performance.now();
    if (now - this._lastUpdate < 500) return; // throttle to 2fps for HUD updates
    this._lastUpdate = now;
    this.windows.forEach(win => {
      if (win.visible && !win.collapsed && win.renderFn) {
        // Skip heavy windows — they update via their own triggers
        if (win.id === 'earth-status') return;
        if (win.id === 'planet-info') return;
        win.renderFn(win.bodyEl);
      }
    });
  },

  // --- Persistence ---
  saveLayout() {
    const layout = {};
    this.windows.forEach((win, id) => {
      layout[id] = { x: win.x, y: win.y, w: win.w, h: win.h, collapsed: win.collapsed, visible: win.visible };
    });
    const groups = {};
    this.tabGroups.forEach((g, gid) => {
      groups[gid] = { winIds: g.winIds, activeId: g.activeId };
    });
    try {
      localStorage.setItem('eoomy-wm', JSON.stringify({ layout, groups }));
    } catch(e) {}
  },

  loadLayout() {
    try {
      const raw = localStorage.getItem('eoomy-wm');
      if (!raw) return;
      const { layout, groups } = JSON.parse(raw);
      // We'll apply after windows are registered
      this._savedLayout = layout;
      this._savedGroups = groups;
    } catch(e) {}
  },

  applyLayout() {
    const layout = this._savedLayout;
    if (!layout) return;
    this.windows.forEach((win, id) => {
      if (layout[id]) {
        const s = layout[id];
        win.x = s.x; win.y = s.y;
        win.el.style.left = s.x + 'px';
        win.el.style.top = s.y + 'px';
        if (s.w) { win.w = s.w; win.el.style.width = s.w + 'px'; }
        if (s.h) { win.h = s.h; win.bodyEl.style.maxHeight = s.h + 'px'; }
        if (s.collapsed !== undefined) {
          win.collapsed = s.collapsed;
          win.bodyEl.style.display = s.collapsed ? 'none' : '';
          win._colBtn.textContent = s.collapsed ? '\u25B6' : '\u25BC';
        }
        if (s.visible !== undefined && !win.pinned) {
          win.visible = s.visible;
          win.el.classList.toggle('gw-hidden', !s.visible);
        }
      }
    });

    // Restore tab groups
    const groups = this._savedGroups;
    if (groups) {
      Object.entries(groups).forEach(([gid, g]) => {
        if (g.winIds.length < 2) return;
        const valid = g.winIds.filter(id => this.windows.has(id));
        if (valid.length < 2) return;
        // Merge them
        for (let i = 1; i < valid.length; i++) {
          this.mergeToTabGroup(valid[i], valid[0]);
        }
        if (g.activeId && valid.includes(g.activeId)) {
          const groupId = this.windows.get(valid[0]).tabGroup;
          if (groupId) this.switchTab(groupId, g.activeId);
        }
      });
    }
  },

  resetLayout() {
    localStorage.removeItem('eoomy-wm');
    location.reload();
  }
};

function spawnAsteroid() {
  const ang  = Math.random() * Math.PI * 2;
  const spd  = 0.00008 + Math.random() * 0.00015;
  const dist = 2 + Math.random() * 20;
  const sx = Math.cos(ang) * dist, sy = Math.sin(ang) * dist;
  const tAng = Math.random() * Math.PI * 2;
  const threat = Math.random() < 0.08;
  const types = ['C-type carbonaceous', 'M-type metallic', 'S-type silicaceous', 'B-type primitive'];
  const comps = [
    'Carbon, silicates, water ice \u2014 high H\u2082O potential.',
    'Nickel-iron core \u2014 high Fe/Ni yield.',
    'Olivine, pyroxene \u2014 moderate Fe yield.',
    'Organic compounds, clay minerals \u2014 science value.',
  ];
  const ti = Math.floor(Math.random() * types.length);
  ASTEROIDS.push({
    name: AST_NAMES[Math.floor(Math.random() * AST_NAMES.length)] + ' ' + (2087 + Math.floor(G.earthDays / 365)),
    x: sx, y: sy,
    vx: Math.cos(tAng) * spd, vy: Math.sin(tAng) * spd,
    r: 1 + Math.random() * 2,
    type: types[ti], comp: comps[ti],
    diam: Math.floor(50 + Math.random() * 900),
    threat,
    age: 0,
  });
}

function updateAsteroids(dtDays) {
  nextAstSpawn -= dtDays;
  if (nextAstSpawn <= 0) {
    spawnAsteroid();
    nextAstSpawn = 200 + Math.random() * 400;
  }
  for (let i = ASTEROIDS.length - 1; i >= 0; i--) {
    const a = ASTEROIDS[i];
    a.x += a.vx * dtDays;
    a.y += a.vy * dtDays;
    a.age += dtDays;
    if (a.age > 3000 || Math.hypot(a.x, a.y) > 80) ASTEROIDS.splice(i, 1);
  }
}

function updateOrbits(dtDays) {
  const dtY = dtDays / DPY;
  Object.values(BODIES).forEach(b => {
    if (b.period > 0) b.ang += (2 * Math.PI / b.period) * dtY;
  });
  if (!G.traveling) G.shipWorld = bw(G.currentBody);
}


// ───────────────────────────────────────────────────────────────
//  21. GAME LOOP & INIT
// ───────────────────────────────────────────────────────────────

let lastTs = null;

function loop(ts) {
  if (!lastTs) lastTs = ts;
  const dt = Math.min((ts - lastTs) / 1000, 0.1);
  lastTs = ts;

  if (G.traveling) {
    updateTravel(dt);
    const dtDays = G.travel.earthDays * (dt / G.travel.realDur);
    updateOrbits(dtDays);
    updateAsteroids(dtDays);
  } else if (!G.paused && G.timeScale > 0) {
    const d = G.timeScale * dt;
    G.earthDays += d;
    updateOrbits(d);
    updateAsteroids(d);
    updateBodyStates(d);
    updateTravelDots(d);
    updateCollecting(d);
    applyPassiveBonuses(d);
    checkEvents();
  }

  draw();
  updateHUD();
  requestAnimationFrame(loop);
}

    body.innerHTML =
      '<div style="font-size:9px;margin-bottom:6px;">' +
        '<span style="color:#ffff00;">LVL ' + G.humanityLevel + '</span> <span style="color:#666;">XP ' + xpPct + '%</span> | ' +
        '<span style="color:#aaa;">' + earthDate() + '</span>' +
      '</div>' +
      '<div style="color:#666;font-size:8px;letter-spacing:1px;margin-bottom:3px;">SPEED</div>' +
      '<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px;">' +
        '<div class="tbtn tb-speed' + (G.timeScale === 0 ? ' active' : '') + '" data-speed="0" onclick="setTimeScale(0)">PAUSE</div>' +
        '<div class="tbtn tb-speed' + (G.timeScale === 1 ? ' active' : '') + '" data-speed="1" onclick="setTimeScale(1)">1x</div>' +
        '<div class="tbtn tb-speed' + (G.timeScale === 10 ? ' active' : '') + '" data-speed="10" onclick="setTimeScale(10)">10x</div>' +
        '<div class="tbtn tb-speed' + (G.timeScale === 100 ? ' active' : '') + '" data-speed="100" onclick="setTimeScale(100)">100x</div>' +
      '</div>' +
      '<div style="color:#666;font-size:8px;letter-spacing:1px;margin-bottom:3px;">LABELS</div>' +
      '<div style="display:flex;gap:4px;margin-bottom:6px;">' +
        '<div class="tbtn tb-label' + (SETTINGS.labelMode === 'all' ? ' active' : '') + '" data-mode="all" onclick="setLabelMode(\'all\')" style="width:52px">ALL</div>' +
        '<div class="tbtn tb-label' + (SETTINGS.labelMode === 'near' ? ' active' : '') + '" data-mode="near" onclick="setLabelMode(\'near\')" style="width:52px">NEAR</div>' +
        '<div class="tbtn tb-label' + (SETTINGS.labelMode === 'none' ? ' active' : '') + '" data-mode="none" onclick="setLabelMode(\'none\')" style="width:52px">NONE</div>' +
      '</div>' +
      '<div style="color:#666;font-size:8px;letter-spacing:1px;margin-bottom:3px;">ORBITS</div>' +
      '<div style="display:flex;gap:4px;margin-bottom:6px;">' +
        '<div class="tbtn tb-orbit' + (SETTINGS.orbits ? ' active' : '') + '" data-val="true" onclick="setOrbits(true)" style="width:52px">ON</div>' +
        '<div class="tbtn tb-orbit' + (!SETTINGS.orbits ? ' active' : '') + '" data-val="false" onclick="setOrbits(false)" style="width:52px">OFF</div>' +
      '</div>' +
      '<button class="tbtn" onclick="resetCamera()" style="width:100%;color:#aaffaa;border-color:#00ff41">\u2302 RESET CAMERA</button>' +
      '<button class="tbtn" onclick="WM.resetLayout()" style="width:100%;color:#ff8844;border-color:#ff8844;margin-top:4px">\u21BA RESET LAYOUT</button>';
  }
});

// --- Planet Info Window ---
WM.register({
  id: 'planet-info', title: 'PLANET INFO',
  x: Math.floor(window.innerWidth / 2 - 200), y: Math.floor(window.innerHeight / 2 - 200),
  w: 400, h: 350, visible: false,
  renderFn(body) {
    if (G.planetPopupKey) renderPlanetPopup();
  }
});

// Event delegation for planet-info clicks (survives innerHTML rebuilds)
(function() {
  const piWin = WM.windows.get('planet-info');
  if (!piWin) return;
  piWin.bodyEl.addEventListener('click', function(e) {
    const target = e.target.closest('[data-action]');
    if (!target) return;
    e.stopPropagation();
    const action = target.dataset.action;
    if (action === 'launch') launchToPopupBody();
    if (action === 'scan') startScan(G.planetPopupKey);
    if (action === 'collect') startCollect(G.planetPopupKey);
    if (action === 'establish') establishBase(G.planetPopupKey);
    if (action === 'pick') pickResource(G.planetPopupKey, target.dataset.res, parseInt(target.dataset.amt));
    if (action === 'build') buildStructure(G.planetPopupKey, target.dataset.uid);
    if (action === 'upgrade') buyPlanetUpgrade(G.planetPopupKey, target.dataset.uid);
  });
  piWin.bodyEl.addEventListener('mousedown', function(e) {
    if (e.target.closest('[data-action]') || e.target.closest('.ubtn') || e.target.closest('button')) {
      e.stopPropagation();
    }
  });
})();

// --- Alerts Window ---
WM.register({
  id: 'alerts', title: 'ALERTS', x: window.innerWidth - 280, y: window.innerHeight - 250, w: 260,
  renderFn(body) {
    if (ALERTS.length === 0) {
      body.innerHTML = '<span class="plog" style="font-size:8px;">No alerts yet. Events will appear here.</span>';
      return;
    }
    body.innerHTML = ALERTS.slice(0, 15).map(a => {
      const cls = 'alert-item alert-' + a.type;
      return '<div class="' + cls + '">' +
        '<span class="alert-time">' + a.time + '</span> ' + a.text +
        (a.response ? '<span class="alert-response">\u2192 ' + a.response + '</span>' : '') +
        '</div>';
    }).join('');
  }
});

// Mobile layout defaults
if (IS_MOBILE && !localStorage.getItem('eoomy-wm')) {
  let yPos = 0;
  const mobileOrder = ['ship-cargo', 'navigation', 'event-log', 'crew', 'ship-systems', 'earth-status', 'alerts'];
  mobileOrder.forEach(id => {
    const w = WM.windows.get(id);
    if (!w) return;
    w.x = 0; w.y = yPos;
    w.el.style.left = '0px';
    w.el.style.top = yPos + 'px';
    w.el.style.width = window.innerWidth + 'px';
    w.w = window.innerWidth;
    if (id !== 'ship-cargo') {
      w.collapsed = true;
      w.bodyEl.style.display = 'none';
      w._colBtn.textContent = '\u25B6';
    }
    yPos += (id === 'ship-cargo' ? w.el.offsetHeight : 36) + 1;
  });
}

// Apply saved layout (positions, collapsed state, tab groups)
WM.applyLayout();

// Init game
spawnAsteroid();
spawnAsteroid();
addLog('System online. Monopoles: 47 units recovered from crater.');
requestAnimationFrame(loop);

</script>
</body>
</html>
